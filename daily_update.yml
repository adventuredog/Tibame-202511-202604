name: Monthly Economic Update & Alert

on:
  schedule:
    - cron: '0 0 15 * *'
  workflow_dispatch:
    inputs:
      tw_cpi:
        description: 'Taiwan CPI (%)'
        required: true
        default: '0.0'
      us_cpi:
        description: 'US CPI (%)'
        required: true
        default: '0.0'

jobs:
  run_monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install yfinance pandas sqlalchemy pymysql

      - name: Execute Script
        env:
          DB_URL: ${{ secrets.DB_URL }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: |
          python crawler_and_calc.py ${{ github.event.inputs.tw_cpi }} ${{ github.event.inputs.us_cpi }}

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add local_data.db || echo "No DB file to add"
          git commit -m "Update DB" || exit 0
          git push origin main
