name: Monthly Economic Update & Alert

on:
  workflow_dispatch:
    inputs:
      tw_cpi:
        description: 'TW CPI'
        default: '0.0'
      us_cpi:
        description: 'US CPI'
        default: '0.0'

jobs:
  run_monitor:
    runs-on: ubuntu-latest
    env:
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: "1234567890123456"
      RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
      DB_URL: ${{ secrets.DB_URL }}
      TEST_DATA: ${{ secrets.TEST_VAR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install yfinance pandas sqlalchemy pymysql

      - name: Execute Script
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          TEST_DATA: ${{ secrets.TEST_VAR }}
        run: |
          echo "Checking environment variables..."
          python crawler_and_calc.py ${{ github.event.inputs.tw_cpi }} ${{ github.event.inputs.us_cpi }}
