name: Monthly Economic Update & Alert

on:
  workflow_dispatch:
    inputs:
      tw_cpi:
        default: '0.0'
      us_cpi:
        default: '0.0'

jobs:
  run_monitor:
    runs-on: ubuntu-latest
    env:
      EMAIL_USER: "katherinechen120@gmail.com"
      EMAIL_PASS: "TEST_12345"
      RECEIVER_EMAIL: "katherinechen120@gmail.com"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install yfinance pandas sqlalchemy pymysql
      - name: Execute Script
        run: |
          python crawler_and_calc.py ${{ github.event.inputs.tw_cpi }} ${{ github.event.inputs.us_cpi }}
      - name: Debug Environment Variable
        run: |
          # ${#變數名} 會印出該變數的字元長度
          echo "The length of EMAIL_USER is: ${#EMAIL_USER}"
          echo "The length of EMAIL_PASS is: ${#EMAIL_PASS}"
