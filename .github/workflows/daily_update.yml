name: Monthly Economic Update & Alert

on:
  workflow_dispatch:
    inputs:
      tw_cpi:
        default: '0.0'
      us_cpi:
        default: '0.0'

jobs:
  run_monitor:
    runs-on: ubuntu-latest
    env:
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.GMAIL_APP_KEY }} 
      RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
      TEST_DATA: ${{ secrets.TEST_VAR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install yfinance pandas sqlalchemy pymysql
      - name: Execute Script
        run: |
          python crawler_and_calc.py ${{ github.event.inputs.tw_cpi }} ${{ github.event.inputs.us_cpi }}
