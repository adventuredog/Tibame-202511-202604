name: Monthly Economic Update & Alert

on:
  schedule:
    - cron: '0 0 15 * *'  # 每月 15 號凌晨執行
  workflow_dispatch:      # 允許手動點擊執行並輸入參數
    inputs:
      tw_cpi:
        description: '台灣 CPI 月變動率 (%)'
        required: true
        default: '0.0'
      us_cpi:
        description: '美國 CPI 月變動率 (%)'
        required: true
        default: '0.0'

jobs:
  run_monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install yfinance pandas sqlalchemy pymysql

      - name: Execute Script
        run: python crawler_and_calc.py ${{ github.event.inputs.tw_cpi }} ${{ github.event.inputs.us_cpi }}
        env:
          DB_URL: ${{ secrets.DB_URL }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}     # 您的 Gmail 帳號
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}     # 您的應用程式密碼
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }} # 收件人
